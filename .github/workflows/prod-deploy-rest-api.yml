name: 🚀 Deploy to Cloud Run

on:
  workflow_dispatch:

jobs:
  deploy:
    name: Build and Deploy to Cloud Run
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Authenticate with Google Cloud
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.INNKIE_DEPLOY_KEY }}

      # 3️⃣ Verify authentication (optional, for debugging)
      - name: Verify GCP authentication
        run: |
          echo "🔍 Verifying authentication..."
          gcloud auth list
          gcloud config list project

      # 4️⃣ Set up Cloud SDK (includes gcloud + docker credentials helper)
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: linkifyurl
          install_components: 'beta'

      # 5️⃣ Configure Docker to use gcloud as credential helper
      - name: Configure Docker for GCP
        run: |
          gcloud auth configure-docker gcr.io --quiet

      # 6️⃣ Build and Push Docker image (locally on GitHub runner)
      - name: Build and Push Docker image
        run: |
          cd rest-api
          IMAGE_NAME=gcr.io/linkifyurl/innkie-backend
          echo "🛠️ Building Docker image: $IMAGE_NAME"
          docker build -t $IMAGE_NAME .
          echo "📤 Pushing image to GCR..."
          docker push $IMAGE_NAME

      # 7️⃣ Deploy to Cloud Run
      - name: Deploy to Cloud Run
        run: |
          IMAGE_NAME=gcr.io/linkifyurl/innkie-backend
          echo "🚀 Deploying $IMAGE_NAME to Cloud Run..."
          gcloud run deploy innkie-backend \
            --image $IMAGE_NAME \
            --region us-central1 \
            --allow-unauthenticated
