name: Deploy to Cloud Run

on:
  workflow_dispatch:

jobs:
  deploy:
    name: Build and Deploy to Cloud Run
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Authenticate with Google Cloud
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_LINKIFYURL }}

      # 3️⃣ Set up Cloud SDK
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: linkifyurl

      # 4️⃣ Build and Push Docker image (inside rest-api/)
      - name: Build and Push Docker image
        run: |
          cd rest-api
          echo "📁 Current directory: $(pwd)"
          ls -al
          gcloud builds submit --tag gcr.io/linkifyurl/innkie-backend .

      # 5️⃣ Deploy to Cloud Run
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy innkie-backend \
            --image gcr.io/linkifyurl/innkie-backend \
            --region us-central1 \
            --allow-unauthenticated \
            --service-account firebase-adminsdk-fbsvc@linkifyurl.iam.gserviceaccount.com
