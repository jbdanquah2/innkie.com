name: Deploy to Cloud Run

on:
  workflow_dispatch:  # ✅ allows manual trigger from GitHub UI

jobs:
  deploy:
    name: Build and Deploy to Cloud Run
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout your code
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: List files (root)
        run: ls -al

      - name: Move into Rest APi dir
        run: |
          cd rest-api
          echo "📁 Current directory: $(pwd)"
          ls -al

      # 2️⃣ Set up Google Cloud SDK
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: linkifyurl
          service_account_key: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_LINKIFYURL }}
          export_default_credentials: true

      # 3️⃣ Move into the backend folder and build the image
      - name: Build and Push Docker image
        run: |
          gcloud builds submit --tag gcr.io/linkifyurl/innkie-backend .

      # 4️⃣ Deploy to Cloud Run
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy innkie-backend \
            --image gcr.io/linkifyurl/innkie-backend \
            --region us-central1 \
            --allow-unauthenticated \
            --service-account firebase-adminsdk-fbsvc@linkifyurl.iam.gserviceaccount.com
