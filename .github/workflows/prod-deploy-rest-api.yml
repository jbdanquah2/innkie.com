name: Deploy to Cloud Run

on:
  workflow_dispatch:

jobs:
  deploy:
    name: Build and Deploy to Cloud Run
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_LINKIFYURL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: linkifyurl

      - name: Build and Push Docker image
        run: |
          cd rest-api
          echo "📁 Current directory: $(pwd)"
          ls -al
          gcloud builds submit --tag gcr.io/linkifyurl/innkie-backend .

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy innkie-backend \
            --image gcr.io/linkifyurl/innkie-backend \
            --region us-central1 \
            --allow-unauthenticated \
            --service-account firebase-adminsdk-fbsvc@linkifyurl.iam.gserviceaccount.com
