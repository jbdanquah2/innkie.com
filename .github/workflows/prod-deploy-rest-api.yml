name: 🚀 Deploy to Cloud Run

on:
  workflow_dispatch:

jobs:
  deploy:
    name: Build and Deploy to Cloud Run
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # Required for Workload Identity Federation

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Authenticate with Google Cloud
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.CLOUD_RUN }}
          project_id: linkifyurl

      # 3️⃣ Set up Cloud SDK (includes gcloud + docker auth helper)
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: linkifyurl
          install_components: 'beta'

      # 4️⃣ Verify authentication (optional)
      - name: Verify GCP authentication
        run: |
          echo "🔍 Verifying authentication..."
          gcloud auth list
          gcloud config list project

      # 5️⃣ Configure Docker for GCP
      - name: Configure Docker for GCP
        run: gcloud auth configure-docker gcr.io --quiet

      # 6️⃣ Build and Push Docker image
      - name: Build and Push Docker image
        run: |
          IMAGE_NAME=gcr.io/linkifyurl/innkie-backend
          echo "🛠️ Building Docker image: $IMAGE_NAME"
          docker build -t $IMAGE_NAME -f rest-api/Dockerfile .
          echo "📤 Pushing image to GCR..."
          docker push $IMAGE_NAME

      # 7️⃣ Deploy to Cloud Run
      - name: Deploy to Cloud Run
        working-directory: ./rest-api
        run: |
          IMAGE_NAME=gcr.io/linkifyurl/innkie-backend
          SERVICE_NAME=innkie-backend
          REGION=us-central1

          echo "🚀 Deploying $SERVICE_NAME to Cloud Run..."
          gcloud run deploy $SERVICE_NAME \
            --image $IMAGE_NAME \
            --region $REGION \
            --platform managed \
            --allow-unauthenticated \
            --memory 512Mi \
            --cpu 1 \
            --max-instances 3 \
            --port 8080
