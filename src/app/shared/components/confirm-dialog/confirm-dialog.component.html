<div class="fixed inset-0 bg-slate-900/40 z-[120] flex items-center justify-center p-4 backdrop-blur-sm animate-in fade-in duration-200">
  <div class="bg-white w-full max-w-md rounded-3xl shadow-2xl overflow-hidden animate-in zoom-in-95 duration-200">
    <div class="p-8">
      <div class="flex items-center gap-4 mb-6">
        <div class="w-12 h-12 rounded-2xl flex items-center justify-center shrink-0"
             [ngClass]="{
               'bg-rose-100 text-rose-600': type() === 'danger',
               'bg-amber-100 text-amber-600': type() === 'warning',
               'bg-primary-100 text-primary-600': type() === 'info'
             }">
          @if (type() === 'danger') {
            <i class="fas fa-exclamation-triangle text-xl"></i>
          } @else if (type() === 'warning') {
            <i class="fas fa-exclamation-circle text-xl"></i>
          } @else {
            <i class="fas fa-info-circle text-xl"></i>
          }
        </div>
        <div>
          <h3 class="text-xl font-black text-slate-900 tracking-tight">{{ title() }}</h3>
          <p class="text-slate-500 font-medium text-sm mt-1 leading-relaxed">
            {{ message() }}
          </p>
        </div>
      </div>

      <div class="flex items-center gap-3">
        <button (click)="onCancel()" 
                class="flex-1 px-6 py-3 bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold rounded-xl transition-all active:scale-95">
          {{ cancelText() }}
        </button>
        <button (click)="onConfirm()" 
                [ngClass]="{
                  'bg-rose-600 hover:bg-rose-700 shadow-rose-200': type() === 'danger',
                  'bg-amber-600 hover:bg-amber-700 shadow-amber-200': type() === 'warning',
                  'bg-primary-600 hover:bg-primary-700 shadow-primary-200': type() === 'info'
                }"
                class="flex-1 px-6 py-3 text-white font-bold rounded-xl transition-all shadow-lg active:scale-95">
          {{ confirmText() }}
        </button>
      </div>
    </div>
  </div>
</div>
