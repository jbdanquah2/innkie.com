<div class="space-y-8 animate-fadeIn">
  <!-- Page Header -->
  <div class="flex flex-col md:flex-row md:items-end justify-between gap-6">
    <div>
      <h1 class="text-3xl font-black text-slate-900 tracking-tight">Links Hub</h1>
      <p class="text-slate-500 font-medium mt-1">Manage and optimize your workspace URLs.</p>
    </div>
    
    <div class="flex items-center gap-3">
       <div class="px-4 py-2 bg-white border border-slate-200 rounded-xl shadow-sm flex items-center gap-4">
          <div class="text-center px-2">
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Total</p>
            <p class="text-sm font-black text-slate-800">{{ allShortUrls.length }}</p>
          </div>
          <div class="w-px h-8 bg-slate-100"></div>
          <div class="text-center px-2">
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Active</p>
            <p class="text-sm font-black text-emerald-600">{{ calcTotalActive }}</p>
          </div>
          <div class="w-px h-8 bg-slate-100"></div>
          <div class="text-center px-2">
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Clicks</p>
            <p class="text-sm font-black text-indigo-600">{{ calcTotalClicks }}</p>
          </div>
       </div>
    </div>
  </div>

  <!-- Management Toolbar -->
  <div class="bg-white p-4 md:p-6 rounded-2xl border border-slate-100 shadow-sm space-y-4">
    <div class="flex flex-col lg:flex-row gap-4">
      <!-- Search -->
      <div class="relative flex-grow">
        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400">
          <i class="fas fa-search text-xs"></i>
        </div>
        <input 
          type="text" 
          (input)="onSearch($event)"
          placeholder="Search by title, alias, tags or original URL..."
          class="w-full pl-11 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 outline-none transition-all font-medium text-sm"
        />
      </div>

      <!-- Filters -->
      <div class="flex flex-wrap items-center gap-3">
        <select (change)="filterByStatus($any($event.target).value)" 
                class="bg-white border border-slate-200 rounded-xl px-4 py-3 text-sm font-bold text-slate-600 outline-none focus:ring-4 focus:ring-indigo-500/10 transition-all cursor-pointer">
          <option value="all">All Status</option>
          <option value="true">Active Only</option>
          <option value="false">Inactive Only</option>
        </select>

        <select (change)="sortByDate($event)"
                class="bg-white border border-slate-200 rounded-xl px-4 py-3 text-sm font-bold text-slate-600 outline-none focus:ring-4 focus:ring-indigo-500/10 transition-all cursor-pointer">
          <option value="newest">Newest First</option>
          <option value="oldest">Oldest First</option>
          <option value="mostClicks">Most Clicks</option>
          <option value="leastClicks">Least Clicks</option>
        </select>
      </div>
    </div>
  </div>

  <!-- Links List -->
  <div class="space-y-4 pb-12">
    <div *ngIf="shortenedUrls.length === 0 && !isLoading" class="py-24 text-center bg-white rounded-3xl border border-dashed border-slate-200 shadow-sm">
       <i class="fas fa-link text-slate-100 text-7xl mb-6"></i>
       <h3 class="text-xl font-bold text-slate-800">No links found</h3>
       <p class="text-slate-500 font-medium">Try adjusting your filters or create a new link to get started.</p>
    </div>

    <div class="grid grid-cols-1 gap-4">
      <app-link-card 
        *ngFor="let url of shortenedUrls" 
        [shortUrl]="url"
        [apiUrl]="apiUrl"
        (editLink)="edit($event)"
        (deleteLink)="deleteShortUrl($event)"
        (copy)="copyToClipboard($any($event))"
        (editQr)="editQRCode($any($event))"
        (openLinkDetails)="openDetails($event)"
      ></app-link-card>
    </div>

    <!-- Load More -->
    <div *ngIf="!noMore && shortenedUrls.length > 0" class="flex justify-center pt-8">
      <button (click)="loadMore()" 
              class="px-10 py-3 bg-white border border-slate-200 text-slate-700 font-bold rounded-xl hover:bg-slate-50 transition-all shadow-sm active:scale-95">
        Load More Links
      </button>
    </div>
  </div>
</div>

<!-- Modals/Overlays -->
<!-- Link Editor Modal -->
<div *ngIf="showLinkEditor" class="fixed inset-0 bg-slate-900/40 z-[100] flex items-center justify-center p-4">
  <div class="w-full max-w-2xl max-h-[90vh] overflow-hidden rounded-3xl animate-in zoom-in-95 duration-200 shadow-2xl">
    <app-link-editor-dialog 
      [data]="selectedUrl"
      (closed)="handleLinkEditorClosed($event)"
    ></app-link-editor-dialog>
  </div>
</div>

<!-- QR Editor Modal -->
<div *ngIf="showQrEditor" class="fixed inset-0 bg-slate-900/40 z-[100] flex items-center justify-center p-4">
  <div class="w-full max-w-4xl max-h-[90vh] overflow-y-auto bg-white rounded-3xl shadow-2xl animate-in zoom-in-95 duration-200">
    <qr-code-generator
      [shortUrl]="selectedUrl!"
      (closed)="handleQrEditorClosed()"
    ></qr-code-generator>
  </div>
</div>
