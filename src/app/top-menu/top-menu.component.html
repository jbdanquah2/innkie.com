<nav class="bg-white border-b border-slate-200 sticky top-0 z-50">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between h-16">
      <div class="flex items-center">
        <app-logo class="flex-shrink-0"></app-logo>

        <!-- Workspace Switcher -->
        <div *ngIf="isLoggedIn" class="relative ml-6 workspace-dropdown hidden sm:block">
          <button (click)="toggleWorkspaceDropdown()" type="button"
                  class="flex items-center text-sm font-semibold text-slate-700 hover:text-indigo-600 transition-colors focus:outline-none bg-slate-50 px-3 py-1.5 rounded-lg border border-slate-200">
            <span class="mr-2">{{ activeWorkspace?.name || 'Default Workspace' }}</span>
            <i class="fas fa-chevron-down text-[10px] transition-transform" [class.rotate-180]="isWorkspaceDropdownOpen"></i>
          </button>

          <div *ngIf="isWorkspaceDropdownOpen"
               class="absolute left-0 z-10 mt-2 w-64 origin-top-left rounded-xl bg-white py-1 shadow-xl ring-1 ring-black ring-opacity-5 focus:outline-none border border-slate-100 overflow-hidden"
               role="menu">
            <div class="px-4 py-2 text-[10px] font-bold text-slate-400 bg-white uppercase tracking-widest">
              My Workspaces
            </div>
            <div class="max-h-60 overflow-y-auto">
              <button *ngFor="let workspace of workspaces"
                      (click)="selectWorkspace(workspace)"
                      class="w-full text-left px-4 py-2.5 text-sm text-slate-700 hover:bg-indigo-50 hover:text-indigo-700 transition-colors flex items-center justify-between">
                <span [class.font-semibold]="workspace.id === activeWorkspace?.id">{{ workspace.name }}</span>
                <i *ngIf="workspace.id === activeWorkspace?.id" class="fas fa-check text-indigo-600 text-xs"></i>
              </button>
            </div>
            <div class="border-t border-slate-100 mt-1">
              <a routerLink="/settings" (click)="isWorkspaceDropdownOpen = false"
                 class="block px-4 py-2.5 text-sm text-indigo-600 hover:bg-slate-50 transition-colors font-medium">
                <i class="fas fa-plus-circle mr-2"></i> Create or Manage
              </a>
            </div>
          </div>
        </div>

        <div class="hidden md:ml-8 md:flex md:space-x-8">
          <a routerLink="/" routerLinkActive="text-indigo-600 border-indigo-600" [routerLinkActiveOptions]="{ exact: true }"
             class="inline-flex items-center px-1 pt-1 border-b-2 border-transparent text-sm font-medium text-slate-500 hover:text-slate-700 hover:border-slate-300 transition-colors">
            Home
          </a>
          <a *ngIf="isLoggedIn" routerLink="/dashboard" routerLinkActive="text-indigo-600 border-indigo-600"
             class="inline-flex items-center px-1 pt-1 border-b-2 border-transparent text-sm font-medium text-slate-500 hover:text-slate-700 hover:border-slate-300 transition-colors">
            Dashboard
          </a>
        </div>
      </div>

      <div class="hidden md:flex md:items-center md:space-x-4">
        <ng-container *ngIf="!isLoggedIn">
          <a [routerLink]="['/login']" [queryParams]="{ signUp: false }"
             class="text-sm font-medium text-slate-600 hover:text-slate-900 transition-colors">
            Log in
          </a>
          <a [routerLink]="['/login']" [queryParams]="{ signUp: true }"
             class="inline-flex items-center px-4 py-2 border border-transparent text-sm font-medium rounded-full shadow-sm text-white bg-indigo-600 hover:bg-indigo-700 transition-all active:scale-95">
            Sign up
          </a>
        </ng-container>

        <div *ngIf="isLoggedIn" class="relative ml-3 profile-dropdown">
          <div>
            <button (click)="toggleProfileDropdown()" type="button" class="flex rounded-full bg-white text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2" id="user-menu-button" aria-expanded="false" aria-haspopup="true">
              <span class="sr-only">Open user menu</span>
              <img class="h-8 w-8 rounded-full border border-slate-200" [src]="userProfilePicUrl" alt="Profile">
            </button>
          </div>

          <!-- Dropdown menu -->
          <div *ngIf="isProfileDropdownOpen"
               class="absolute right-0 z-10 mt-2 w-48 origin-top-right rounded-xl bg-white py-1 shadow-lg ring-1 ring-black ring-opacity-5 focus:outline-none border border-slate-100 overflow-hidden"
               role="menu" aria-orientation="vertical" aria-labelledby="user-menu-button" tabindex="-1">
            <a routerLink="/dashboard" class="block px-4 py-2 text-sm text-slate-700 hover:bg-slate-50 transition-colors" role="menuitem" (click)="isProfileDropdownOpen = false">Dashboard</a>
            <a (click)="logout()" class="block px-4 py-2 text-sm text-red-600 hover:bg-red-50 transition-colors cursor-pointer" role="menuitem">
              <i class="fas fa-sign-out-alt mr-2"></i> Logout
            </a>
          </div>
        </div>
      </div>

      <!-- Mobile menu button -->
      <div class="flex items-center md:hidden">
        <button (click)="toggleMenu()" type="button" class="inline-flex items-center justify-center p-2 rounded-md text-slate-400 hover:text-slate-500 hover:bg-slate-100 transition-colors" aria-controls="mobile-menu" aria-expanded="false">
          <span class="sr-only">Open main menu</span>
          <i [class]="isMenuOpen ? 'fas fa-times text-xl' : 'fas fa-bars text-xl'"></i>
        </button>
      </div>
    </div>
  </div>

  <!-- Mobile menu -->
  <div *ngIf="isMenuOpen" class="md:hidden bg-white border-t border-slate-100" id="mobile-menu">
    <div class="pt-2 pb-3 space-y-1 px-4">
      <a routerLink="/" (click)="isMenuOpen = false" routerLinkActive="bg-indigo-50 text-indigo-600" [routerLinkActiveOptions]="{ exact: true }"
         class="block pl-3 pr-4 py-2 border-l-4 border-transparent text-base font-medium text-slate-600 hover:bg-slate-50 hover:border-slate-300 transition-all">
        Home
      </a>
      <a *ngIf="isLoggedIn" routerLink="/dashboard" (click)="isMenuOpen = false" routerLinkActive="bg-indigo-50 text-indigo-600"
         class="block pl-3 pr-4 py-2 border-l-4 border-transparent text-base font-medium text-slate-600 hover:bg-slate-50 hover:border-slate-300 transition-all">
        Dashboard
      </a>
    </div>
    <div *ngIf="!isLoggedIn" class="pt-4 pb-3 border-t border-slate-200 px-4 flex flex-col space-y-2">
      <a [routerLink]="['/login']" [queryParams]="{ signUp: false }" (click)="isMenuOpen = false"
         class="block text-center px-4 py-2 text-base font-medium text-slate-600 hover:bg-slate-50 rounded-lg">
        Log in
      </a>
      <a [routerLink]="['/login']" [queryParams]="{ signUp: true }" (click)="isMenuOpen = false"
         class="block text-center px-4 py-2 text-base font-medium text-white bg-indigo-600 hover:bg-indigo-700 rounded-lg shadow-sm">
        Sign up
      </a>
    </div>
    <div *ngIf="isLoggedIn" class="pt-4 pb-3 border-t border-slate-200 px-4">
      <div class="flex items-center px-3 mb-3">
        <div class="flex-shrink-0">
          <img class="h-10 w-10 rounded-full border border-slate-200" [src]="userProfilePicUrl" alt="Profile">
        </div>
        <div class="ml-3">
          <div class="text-base font-medium text-slate-800">User Profile</div>
        </div>
      </div>
      <div class="space-y-1">
        <a (click)="logout()" class="block px-3 py-2 text-base font-medium text-red-600 hover:bg-red-50 rounded-lg transition-colors cursor-pointer">
          <i class="fas fa-sign-out-alt mr-2"></i> Logout
        </a>
      </div>
    </div>
  </div>
</nav>
