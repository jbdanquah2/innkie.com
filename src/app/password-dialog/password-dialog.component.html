<mat-card class="password-card">
  <div class="lock-icon">
    <mat-icon color="primary" fontIcon="lock"></mat-icon>
  </div>

  <h2 class="title">Enter Password to Access</h2>
  <p class="subtitle">
    This link is password-protected. Please enter the correct password below.
  </p>

  <div class="info-box">
    <mat-icon color="primary">security</mat-icon>
    <div>
      <strong>Password Required</strong>
      <p>To access this link, please enter the correct password.</p>
    </div>
  </div>

  <mat-form-field appearance="outline" class="full-width">
    <mat-label>Enter your password</mat-label>
    <mat-icon matPrefix>lock</mat-icon>
    <input
      matInput
      [type]="hide ? 'password' : 'text'"
      [(ngModel)]="password"
    />
    <button
      mat-icon-button
      matSuffix
      (click)="hide = !hide"
      [attr.aria-label]="'Hide or show password'"
      [attr.aria-pressed]="!hide"
    >
      <mat-icon>{{ hide ? 'visibility_off' : 'visibility' }}</mat-icon>
    </button>
  </mat-form-field>

  <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>

  <button
    mat-raised-button
    color="primary"
    class="unlock-btn"
    (click)="unlock()"
  >
    <mat-icon>arrow_forward</mat-icon>
    Unlock Link
  </button>

  <a class="back-link" routerLink="/">← Back to Home</a>
</mat-card>
